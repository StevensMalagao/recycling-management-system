<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6E6D67" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
    .label { font-size: 12px; font-weight: 400; fill: #8B8A84; }
  </style>
</defs>

<!-- Stage 1: Hardware -->
<rect x="30" y="30" width="620" height="160" rx="14" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="50" y="57" fill="#9FE1CB">① Physical Acquisition &amp; Control</text>
<text class="ts" x="50" y="74" fill="#5DCAA5">Hardware</text>

<rect x="52" y="88" width="130" height="84" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="117" y="122" text-anchor="middle" fill="#9FE1CB">Load cell</text>
<text class="ts" x="117" y="154" text-anchor="middle" fill="#5DCAA5">Detects weight</text>

<rect x="202" y="88" width="130" height="84" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="267" y="122" text-anchor="middle" fill="#9FE1CB">RTC module</text>
<text class="ts" x="267" y="154" text-anchor="middle" fill="#5DCAA5">Accurate date &amp; time</text>

<rect x="352" y="88" width="130" height="84" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="417" y="122" text-anchor="middle" fill="#9FE1CB">Physical buttons</text>
<text class="ts" x="417" y="154" text-anchor="middle" fill="#5DCAA5">Tare, calibration</text>

<rect x="502" y="88" width="130" height="84" rx="8" fill="#085041" stroke="#5DCAA5" stroke-width="0.5"/>
<text class="th" x="567" y="122" text-anchor="middle" fill="#9FE1CB">Local display</text>
<text class="ts" x="567" y="154" text-anchor="middle" fill="#5DCAA5">Weight, messages</text>

<!-- Arrow HW → FW -->
<line x1="340" y1="190" x2="340" y2="228" stroke="#6E6D67" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="214">Serial port</text>

<!-- Stage 2: Firmware -->
<rect x="30" y="230" width="620" height="160" rx="14" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="50" y="257" fill="#CECBF6">② Processing &amp; Transmission</text>
<text class="ts" x="50" y="274" fill="#AFA9EC">Firmware / Microcontroller</text>

<rect x="52" y="288" width="130" height="84" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="117" y="322" text-anchor="middle" fill="#CECBF6">Math filter</text>
<text class="ts" x="117" y="354" text-anchor="middle" fill="#AFA9EC">Removes signal noise</text>

<rect x="202" y="288" width="130" height="84" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="267" y="322" text-anchor="middle" fill="#CECBF6">Calibration</text>
<text class="ts" x="267" y="354" text-anchor="middle" fill="#AFA9EC">Signal → kilograms</text>

<rect x="352" y="288" width="130" height="84" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="417" y="322" text-anchor="middle" fill="#CECBF6">Output protocol</text>
<text class="ts" x="417" y="354" text-anchor="middle" fill="#AFA9EC">Packages data</text>

<rect x="502" y="288" width="130" height="84" rx="8" fill="#3C3489" stroke="#AFA9EC" stroke-width="0.5"/>
<text class="th" x="567" y="322" text-anchor="middle" fill="#CECBF6">Internal memory</text>
<text class="ts" x="567" y="354" text-anchor="middle" fill="#AFA9EC">Calibration values</text>

<!-- Arrow FW → SW -->
<line x1="340" y1="390" x2="340" y2="428" stroke="#6E6D67" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="414">Text frame</text>

<!-- Stage 3: Software -->
<rect x="30" y="430" width="620" height="160" rx="14" fill="#4A1B0C" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="50" y="457" fill="#F5C4B3">③ Reception &amp; Business Logic</text>
<text class="ts" x="50" y="474" fill="#F0997B">Desktop application</text>

<rect x="52" y="488" width="130" height="84" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="117" y="522" text-anchor="middle" fill="#F5C4B3">Active listener</text>
<text class="ts" x="117" y="554" text-anchor="middle" fill="#F0997B">Background process</text>

<rect x="202" y="488" width="130" height="84" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="267" y="522" text-anchor="middle" fill="#F5C4B3">Data parser</text>
<text class="ts" x="267" y="554" text-anchor="middle" fill="#F0997B">Splits weight &amp; time</text>

<rect x="352" y="488" width="130" height="84" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="417" y="522" text-anchor="middle" fill="#F5C4B3">Admin context</text>
<text class="ts" x="417" y="554" text-anchor="middle" fill="#F0997B">Collector, material</text>

<rect x="502" y="488" width="130" height="84" rx="8" fill="#712B13" stroke="#F0997B" stroke-width="0.5"/>
<text class="th" x="567" y="522" text-anchor="middle" fill="#F5C4B3">Net weight</text>
<text class="ts" x="567" y="554" text-anchor="middle" fill="#F0997B">Subtracts container tare</text>

<!-- Arrow SW → DB -->
<line x1="340" y1="590" x2="340" y2="628" stroke="#6E6D67" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="614">Validated record</text>

<!-- Stage 4: Database -->
<rect x="30" y="630" width="620" height="160" rx="14" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="50" y="657" fill="#FAC775">④ Persistence &amp; Reporting</text>
<text class="ts" x="50" y="674" fill="#EF9F27">Database / Spreadsheets</text>

<rect x="52" y="688" width="130" height="84" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="117" y="716" text-anchor="middle" fill="#FAC775">Identity</text>
<text class="th" x="117" y="732" text-anchor="middle" fill="#FAC775">validation</text>
<text class="ts" x="117" y="754" text-anchor="middle" fill="#EF9F27">Verifies collector ID</text>

<rect x="202" y="688" width="130" height="84" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="267" y="716" text-anchor="middle" fill="#FAC775">Structured</text>
<text class="th" x="267" y="732" text-anchor="middle" fill="#FAC775">storage</text>
<text class="ts" x="267" y="754" text-anchor="middle" fill="#EF9F27">Sheets by month/year</text>

<rect x="352" y="688" width="130" height="84" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="417" y="716" text-anchor="middle" fill="#FAC775">Dynamic</text>
<text class="th" x="417" y="732" text-anchor="middle" fill="#FAC775">expansion</text>
<text class="ts" x="417" y="754" text-anchor="middle" fill="#EF9F27">Auto-creates columns</text>

<rect x="502" y="688" width="130" height="84" rx="8" fill="#633806" stroke="#EF9F27" stroke-width="0.5"/>
<text class="th" x="567" y="716" text-anchor="middle" fill="#FAC775">Historical</text>
<text class="th" x="567" y="732" text-anchor="middle" fill="#FAC775">record</text>
<text class="ts" x="567" y="754" text-anchor="middle" fill="#EF9F27">Permanent traceability</text>

</svg>
