<svg width="680" height="820" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
    .label { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  </style>
</defs>

<!-- Stage 1: Hardware -->
<rect x="30" y="30" width="620" height="160" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="50" y="57" fill="#085041">① Physical Acquisition &amp; Control</text>
<text class="ts" x="50" y="74" fill="#0F6E56">Hardware</text>

<rect x="52" y="88" width="130" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="117" y="122" text-anchor="middle" fill="#085041">Load cell</text>
<text class="ts" x="117" y="154" text-anchor="middle" fill="#0F6E56">Detects weight</text>

<rect x="202" y="88" width="130" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="267" y="122" text-anchor="middle" fill="#085041">RTC module</text>
<text class="ts" x="267" y="154" text-anchor="middle" fill="#0F6E56">Accurate date &amp; time</text>

<rect x="352" y="88" width="130" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="417" y="122" text-anchor="middle" fill="#085041">Physical buttons</text>
<text class="ts" x="417" y="154" text-anchor="middle" fill="#0F6E56">Tare, calibration</text>

<rect x="502" y="88" width="130" height="84" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="567" y="122" text-anchor="middle" fill="#085041">Local display</text>
<text class="ts" x="567" y="154" text-anchor="middle" fill="#0F6E56">Weight, messages</text>

<!-- Arrow HW → FW -->
<line x1="340" y1="190" x2="340" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="214">Serial port</text>

<!-- Stage 2: Firmware -->
<rect x="30" y="230" width="620" height="160" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="50" y="257" fill="#26215C">② Processing &amp; Transmission</text>
<text class="ts" x="50" y="274" fill="#534AB7">Firmware / Microcontroller</text>

<rect x="52" y="288" width="130" height="84" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="117" y="322" text-anchor="middle" fill="#26215C">Math filter</text>
<text class="ts" x="117" y="354" text-anchor="middle" fill="#3C3489">Removes signal noise</text>

<rect x="202" y="288" width="130" height="84" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="267" y="322" text-anchor="middle" fill="#26215C">Calibration</text>
<text class="ts" x="267" y="354" text-anchor="middle" fill="#3C3489">Signal → kilograms</text>

<rect x="352" y="288" width="130" height="84" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="417" y="322" text-anchor="middle" fill="#26215C">Output protocol</text>
<text class="ts" x="417" y="354" text-anchor="middle" fill="#3C3489">Packages data</text>

<rect x="502" y="288" width="130" height="84" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="567" y="322" text-anchor="middle" fill="#26215C">Internal memory</text>
<text class="ts" x="567" y="354" text-anchor="middle" fill="#3C3489">Calibration values</text>

<!-- Arrow FW → SW -->
<line x1="340" y1="390" x2="340" y2="428" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="414">Text frame</text>

<!-- Stage 3: Software -->
<rect x="30" y="430" width="620" height="160" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="50" y="457" fill="#4A1B0C">③ Reception &amp; Business Logic</text>
<text class="ts" x="50" y="474" fill="#993C1D">Desktop application</text>

<rect x="52" y="488" width="130" height="84" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="117" y="522" text-anchor="middle" fill="#4A1B0C">Active listener</text>
<text class="ts" x="117" y="554" text-anchor="middle" fill="#712B13">Background process</text>

<rect x="202" y="488" width="130" height="84" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="267" y="522" text-anchor="middle" fill="#4A1B0C">Data parser</text>
<text class="ts" x="267" y="554" text-anchor="middle" fill="#712B13">Splits weight &amp; time</text>

<rect x="352" y="488" width="130" height="84" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="417" y="522" text-anchor="middle" fill="#4A1B0C">Admin context</text>
<text class="ts" x="417" y="554" text-anchor="middle" fill="#712B13">Collector, material</text>

<rect x="502" y="488" width="130" height="84" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="567" y="522" text-anchor="middle" fill="#4A1B0C">Net weight</text>
<text class="ts" x="567" y="554" text-anchor="middle" fill="#712B13">Subtracts container tare</text>

<!-- Arrow SW → DB -->
<line x1="340" y1="590" x2="340" y2="628" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="label" x="348" y="614">Validated record</text>

<!-- Stage 4: Database -->
<rect x="30" y="630" width="620" height="160" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="50" y="657" fill="#412402">④ Persistence &amp; Reporting</text>
<text class="ts" x="50" y="674" fill="#854F0B">Database / Spreadsheets</text>

<rect x="52" y="688" width="130" height="84" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="117" y="716" text-anchor="middle" fill="#412402">Identity</text>
<text class="th" x="117" y="732" text-anchor="middle" fill="#412402">validation</text>
<text class="ts" x="117" y="754" text-anchor="middle" fill="#633806">Verifies collector ID</text>

<rect x="202" y="688" width="130" height="84" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="267" y="716" text-anchor="middle" fill="#412402">Structured</text>
<text class="th" x="267" y="732" text-anchor="middle" fill="#412402">storage</text>
<text class="ts" x="267" y="754" text-anchor="middle" fill="#633806">Sheets by month/year</text>

<rect x="352" y="688" width="130" height="84" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="417" y="716" text-anchor="middle" fill="#412402">Dynamic</text>
<text class="th" x="417" y="732" text-anchor="middle" fill="#412402">expansion</text>
<text class="ts" x="417" y="754" text-anchor="middle" fill="#633806">Auto-creates columns</text>

<rect x="502" y="688" width="130" height="84" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="567" y="716" text-anchor="middle" fill="#412402">Historical</text>
<text class="th" x="567" y="732" text-anchor="middle" fill="#412402">record</text>
<text class="ts" x="567" y="754" text-anchor="middle" fill="#633806">Permanent traceability</text>

</svg>
